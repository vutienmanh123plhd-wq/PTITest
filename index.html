<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:,">
    <title>Hệ thống thi PTIT</title>
</head>
<body>
    <header style="background: var(--ptit-red); color: white; padding: 15px 0;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <h2>PTIT EXAM</h2>
            <nav>
                <input type="text" id="searchExam" placeholder="Tìm kiếm kỳ thi...">
                <button class="btn" style="color: white;">Đăng xuất</button>
            </nav>
        </div>
    </header>

    <main class="container" style="margin-top: 30px;">
        <h3>Danh sách kỳ thi</h3>
        <div id="examList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px;">
            <div class="card">
                <h4>Thi Giữa Kỳ - Lập trình Web</h4>
                <p>Trạng thái: <span style="color: green;">Đang mở</span></p>
                <p>Thời gian: 45 phút</p>
                <button class="btn btn-primary" onclick="startExam()">Vào thi</button>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
