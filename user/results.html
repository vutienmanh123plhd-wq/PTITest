<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="icon" href="data:,">
    <title>Kết Quả Thi - PTIT Exam System</title>
    <style>
        .results-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .results-header {
            background: linear-gradient(135deg, var(--ptit-red) 0%, var(--ptit-red-dark) 100%);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .results-header h1 {
            margin-bottom: 10px;
            font-size: 32px;
        }

        .results-header p {
            font-size: 16px;
            margin: 5px 0;
            opacity: 0.9;
        }

        .score-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 150px;
            height: 150px;
            border: 5px solid white;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            margin: 20px auto;
            font-size: 48px;
            font-weight: bold;
        }

        .score-circle.excellent {
            border-color: #6bcf7f;
            background: rgba(107,207,127,0.2);
        }

        .score-circle.good {
            border-color: #6bcf7f;
            background: rgba(107,207,127,0.2);
        }

        .score-circle.pass {
            border-color: #ffd93d;
            background: rgba(255,217,61,0.2);
        }

        .score-circle.fail {
            border-color: #ff6b6b;
            background: rgba(255,107,107,0.2);
        }

        .results-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 4px solid var(--ptit-red);
        }

        .stat-card h4 {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--ptit-red);
            margin: 10px 0;
        }

        .stat-detail {
            font-size: 13px;
            color: #999;
        }

        .results-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .results-content h2 {
            color: var(--ptit-red);
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 3px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .answer-review {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background: #fafafa;
        }

        .answer-review.correct {
            border-left: 5px solid #6bcf7f;
            background: #f0fff4;
        }

        .answer-review.incorrect {
            border-left: 5px solid #ff6b6b;
            background: #fff5f5;
        }

        .question-info {
            margin-bottom: 15px;
        }

        .question-number {
            font-weight: bold;
            color: var(--ptit-red);
            margin-bottom: 5px;
            font-size: 16px;
        }

        .question-text {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .answer-box {
            background: white;
            padding: 12px;
            border-radius: 5px;
            margin: 8px 0;
            border-left: 3px solid #666;
        }

        .answer-box.user-answer {
            border-left-color: #3498db;
        }

        .answer-box.correct-answer {
            border-left-color: #6bcf7f;
        }

        .answer-label {
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 3px;
        }

        .answer-text {
            font-size: 14px;
            color: #333;
        }

        .answer-status {
            display: inline-block;
            margin-left: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-correct {
            background: #d4edda;
            color: #155724;
        }

        .status-incorrect {
            background: #f8d7da;
            color: #721c24;
        }

        .progress-section {
            margin-bottom: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6bcf7f 0%, #4caf50 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .progress-fill.low {
            background: linear-gradient(90deg, #ff6b6b 0%, #ff4757 100%);
        }

        .progress-fill.medium {
            background: linear-gradient(90deg, #ffd93d 0%, #ffb700 100%);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .btn-primary {
            background: var(--ptit-red);
            color: white;
        }

        .btn-primary:hover {
            background: var(--ptit-red-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(153,0,0,0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            border-color: var(--ptit-red);
        }

        .recommendation {
            background: linear-gradient(135deg, #e3f2fd 0%, #fff9c4 100%);
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            border-left: 5px solid var(--ptit-red);
        }

        .recommendation h3 {
            color: var(--ptit-red);
            margin-bottom: 10px;
        }

        .recommendation p {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }

        .statistics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-mini {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            border: 1px solid #ddd;
        }

        .stat-mini-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--ptit-red);
            margin: 5px 0;
        }

        .stat-mini-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .results-header {
                padding: 25px;
            }

            .results-header h1 {
                font-size: 24px;
            }

            .score-circle {
                width: 120px;
                height: 120px;
                font-size: 36px;
            }

            .results-stats {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body class="results-page">
    <div class="results-container">
        <!-- Results Header -->
        <div class="results-header">
            <h1>📊 HOÀN THÀNH BÀI THI</h1>
            <div class="score-circle" id="scoreCircle">--</div>
            <p id="resultMessage">Đang tính kết quả...</p>
            <p id="examName"></p>
        </div>

        <!-- Statistics Grid -->
        <div class="results-stats" id="statsGrid"></div>

        <!-- Performance Analysis -->
        <div class="results-content">
            <h2>📈 Phân Tích Kết Quả</h2>
            
            <div class="progress-section">
                <h4>Tỷ Lệ Trả Lời Đúng</h4>
                <div class="progress-bar">
                    <div class="progress-fill" id="correctPercentageBar">0%</div>
                </div>
            </div>

            <div class="statistics-grid" id="miniStats"></div>

            <div class="recommendation" id="recommendation">
                <h3>💡 Nhận Xét</h3>
                <p id="recommendationText"></p>
            </div>
        </div>

        <!-- Answer Review Section -->
        <div class="results-content">
            <h2>✓ Xem Lại Câu Trả Lời</h2>
            <div id="answerReviewContainer"></div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="goBackToMain()">← Quay Lại Trang Chính</button>
            <button class="btn btn-secondary" onclick="printResults()">🖨️ In Kết Quả</button>
            <button class="btn btn-secondary" onclick="retakeExam()" id="retakeBtn">↻ Làm Lại Bài Thi</button>
        </div>
    </div>

    <script src="../js/exam-data.js"></script>
    <script src="../js/results.js"></script>
</body>
</html>
