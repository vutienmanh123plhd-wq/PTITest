<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="icon" href="data:,">
    <title>Đăng Ký - PTIT Exam System</title>
</head>
<body class="auth-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="../images/ptit-logo.png" alt="PTIT Logo" class="login-logo">
                <h1>PTIT Exam</h1>
                <p>Đăng ký tài khoản sinh viên</p>
            </div>

            <form id="registerForm" class="login-form">
                <!-- Username -->
                <div class="form-group">
                    <label for="registerUsername">Tên người dùng <span style="color: #ff6b6b;">*</span></label>
                    <input type="text" id="registerUsername" placeholder="3-20 ký tự (chữ, số, _)" required>
                    <span class="error-message" id="registerUsernameError"></span>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="registerEmail">Email <span style="color: #ff6b6b;">*</span></label>
                    <input type="email" id="registerEmail" placeholder="example@ptit.edu.vn" required>
                    <span class="error-message" id="registerEmailError"></span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="registerPassword">Mật khẩu <span style="color: #ff6b6b;">*</span></label>
                    <input type="password" id="registerPassword" placeholder="Tối thiểu 6 ký tự" required>
                    <span class="error-message" id="registerPasswordError"></span>
                    <div style="margin-top: 5px; font-size: 11px; color: #666;">
                        Password Strength: <span id="strengthText">-</span>
                    </div>
                    <div style="margin-top: 5px; height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden;">
                        <div id="strengthBar" style="height: 100%; width: 0%; background: #ff6b6b; transition: all 0.3s;"></div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="registerConfirmPassword">Xác nhận mật khẩu <span style="color: #ff6b6b;">*</span></label>
                    <input type="password" id="registerConfirmPassword" placeholder="Nhập lại mật khẩu" required>
                    <span class="error-message" id="registerConfirmPasswordError"></span>
                </div>

                <!-- Terms -->
                <div class="form-group">
                    <div style="display: flex; align-items: flex-start; gap: 10px; margin: 15px 0;">
                        <input type="checkbox" id="agreeTerms" style="margin-top: 3px;" required>
                        <label for="agreeTerms" style="font-size: 13px; font-weight: normal; margin: 0;">
                            Tôi đồng ý với <a href="#" style="color: #0066cc;">điều khoản dịch vụ</a> 
                            và <a href="#" style="color: #0066cc;">chính sách bảo mật</a>
                        </label>
                    </div>
                    <span class="error-message" id="registerTermsError"></span>
                </div>

                <button type="submit" class="btn btn-login">Đăng Ký</button>
            </form>

            <div id="registerMessage" class="login-message" style="display: none;"></div>

            <div class="auth-links">
                <p>Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a></p>
            </div>
        </div>
    </div>

    <script src="../js/validation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const passwordInput = document.getElementById('registerPassword');
            
            if (passwordInput) {
                passwordInput.addEventListener('input', function() {
                    updatePasswordStrength(this.value);
                });
            }
            
            if (registerForm) {
                registerForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    handleRegisterSubmit();
                });
            }
        });

        function updatePasswordStrength(password) {
            let strength = 0;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            let barColor = '#ff6b6b';
            let barWidth = '0%';
            let text = '-';
            
            if (strength <= 2) {
                barColor = '#ff6b6b';
                barWidth = '33%';
                text = 'Weak';
            } else if (strength <= 3) {
                barColor = '#ffd93d';
                barWidth = '66%';
                text = 'Fair';
            } else {
                barColor = '#6bcf7f';
                barWidth = '100%';
                text = 'Good';
            }
            
            strengthBar.style.backgroundColor = barColor;
            strengthBar.style.width = barWidth;
            strengthText.textContent = text;
        }

        function handleRegisterSubmit() {
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const confirmPassword = document.getElementById('registerConfirmPassword').value.trim();
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            const usernameError = document.getElementById('registerUsernameError');
            const emailError = document.getElementById('registerEmailError');
            const passwordError = document.getElementById('registerPasswordError');
            const confirmPasswordError = document.getElementById('registerConfirmPasswordError');
            const termsError = document.getElementById('registerTermsError');
            const registerMessage = document.getElementById('registerMessage');
            
            // Reset errors
            usernameError.textContent = '';
            emailError.textContent = '';
            passwordError.textContent = '';
            confirmPasswordError.textContent = '';
            termsError.textContent = '';
            registerMessage.style.display = 'none';
            
            let isValid = true;
            
            // Validate username
            if (!username) {
                usernameError.textContent = 'Vui lòng nhập tên người dùng';
                isValid = false;
            } else if (!validateUsername(username)) {
                usernameError.textContent = 'Tên người dùng phải có 3-20 ký tự (chữ, số, _)';
                isValid = false;
            }
            
            // Validate email
            if (!email) {
                emailError.textContent = 'Vui lòng nhập email';
                isValid = false;
            } else if (!validateEmail(email)) {
                emailError.textContent = 'Email không hợp lệ';
                isValid = false;
            }
            
            // Validate password
            if (!password) {
                passwordError.textContent = 'Vui lòng nhập mật khẩu';
                isValid = false;
            } else if (!validatePassword(password)) {
                passwordError.textContent = 'Mật khẩu phải có ít nhất 6 ký tự';
                isValid = false;
            }
            
            // Validate confirm password
            if (!confirmPassword) {
                confirmPasswordError.textContent = 'Vui lòng xác nhận mật khẩu';
                isValid = false;
            } else if (password !== confirmPassword) {
                confirmPasswordError.textContent = 'Mật khẩu xác nhận không khớp';
                isValid = false;
            }
            
            // Validate terms
            if (!agreeTerms) {
                termsError.textContent = 'Vui lòng đồng ý với điều khoản dịch vụ';
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Register success
            registerMessage.style.display = 'flex';
            registerMessage.className = 'login-message success';
            registerMessage.textContent = 'Đăng ký thành công! Chuyển hướng...';
            
            // Store new user
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            users.push({
                username: username,
                email: email,
                password: password,
                registeredAt: new Date().toISOString()
            });
            localStorage.setItem('users', JSON.stringify(users));
            
            // Redirect to login
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        }
    </script>
</body>
</html>
